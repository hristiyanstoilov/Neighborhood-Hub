name: DB Backup

on:
  schedule:
    - cron: '0 3 * * *'   # 03:00 UTC daily
  workflow_dispatch:        # allow manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_KEY }}
      R2_ENDPOINT: https://${{ secrets.CLOUDFLARE_R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
      R2_BUCKET: ${{ secrets.CLOUDFLARE_R2_BACKUP_BUCKET }}

    steps:
      - name: Install PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Set backup filename
        id: vars
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H-%M-%SZ")
          DOW=$(date -u +%u)          # 1=Mon … 7=Sun
          DOM=$(date -u +%-d)         # day-of-month 1..31
          echo "timestamp=$TIMESTAMP" >> "$GITHUB_OUTPUT"
          echo "dow=$DOW"             >> "$GITHUB_OUTPUT"
          echo "dom=$DOM"             >> "$GITHUB_OUTPUT"

      - name: Dump and compress database
        run: |
          pg_dump "${{ secrets.PROD_DATABASE_DIRECT_URL }}" \
            --format=plain \
            --no-acl \
            --no-owner \
            | gzip > backup-${{ steps.vars.outputs.timestamp }}.sql.gz

      - name: Upload daily backup
        run: |
          aws s3 cp backup-${{ steps.vars.outputs.timestamp }}.sql.gz \
            "s3://${R2_BUCKET}/daily/backup-${{ steps.vars.outputs.timestamp }}.sql.gz" \
            --endpoint-url "${R2_ENDPOINT}" \
            --region auto

      - name: Upload weekly backup (every Sunday)
        if: steps.vars.outputs.dow == '7'
        run: |
          aws s3 cp backup-${{ steps.vars.outputs.timestamp }}.sql.gz \
            "s3://${R2_BUCKET}/weekly/backup-${{ steps.vars.outputs.timestamp }}.sql.gz" \
            --endpoint-url "${R2_ENDPOINT}" \
            --region auto

      - name: Upload monthly backup (1st of month)
        if: steps.vars.outputs.dom == '1'
        run: |
          aws s3 cp backup-${{ steps.vars.outputs.timestamp }}.sql.gz \
            "s3://${R2_BUCKET}/monthly/backup-${{ steps.vars.outputs.timestamp }}.sql.gz" \
            --endpoint-url "${R2_ENDPOINT}" \
            --region auto

      - name: Prune old daily backups (keep 7)
        run: |
          aws s3 ls "s3://${R2_BUCKET}/daily/" \
            --endpoint-url "${R2_ENDPOINT}" --region auto \
          | sort | head -n -7 \
          | awk '{print $4}' \
          | xargs -I{} aws s3 rm "s3://${R2_BUCKET}/daily/{}" \
              --endpoint-url "${R2_ENDPOINT}" --region auto \
          || true

      - name: Prune old weekly backups (keep 5)
        run: |
          aws s3 ls "s3://${R2_BUCKET}/weekly/" \
            --endpoint-url "${R2_ENDPOINT}" --region auto \
          | sort | head -n -5 \
          | awk '{print $4}' \
          | xargs -I{} aws s3 rm "s3://${R2_BUCKET}/weekly/{}" \
              --endpoint-url "${R2_ENDPOINT}" --region auto \
          || true

      - name: Prune old monthly backups (keep 12)
        run: |
          aws s3 ls "s3://${R2_BUCKET}/monthly/" \
            --endpoint-url "${R2_ENDPOINT}" --region auto \
          | sort | head -n -12 \
          | awk '{print $4}' \
          | xargs -I{} aws s3 rm "s3://${R2_BUCKET}/monthly/{}" \
              --endpoint-url "${R2_ENDPOINT}" --region auto \
          || true
